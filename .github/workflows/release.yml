name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package driver (.c4z)
        run: |
          cp driver/Android_v2.0.c4z AndroidTV_v${{ steps.version.outputs.VERSION }}.c4z

      - name: Package AndroidTV_Tool (Windows utility)
        run: |
          cd AndroidTV_Tool
          zip -r ../AndroidTV_Tool_v${{ steps.version.outputs.VERSION }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AndroidTV Control4 Driver v${{ steps.version.outputs.VERSION }}"
          body: |
            ## AndroidTV Control4 Driver v${{ steps.version.outputs.VERSION }}

            Control4 DriverWorks driver for Android TV / Google TV using the Android TV Remote Service v2 protocol.

            ### Downloads

            | File | Description |
            |---|---|
            | `AndroidTV_v${{ steps.version.outputs.VERSION }}.c4z` | Control4 driver — install this in Composer |
            | `AndroidTV_Tool_v${{ steps.version.outputs.VERSION }}.zip` | Windows utility for RSA key extraction (required for pairing setup) |

            ### Quick Start
            1. Install the `.c4z` driver in Control4 Composer
            2. Set the network binding to your Android TV device's static IP
            3. Run **AndroidTV_Tool** on a Windows PC to extract the device RSA public key
            4. Enter the key values in the driver properties, then pair

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.

            ---
            > Driver authored by **Greg Moerler**.
          files: |
            AndroidTV_v${{ steps.version.outputs.VERSION }}.c4z
            AndroidTV_Tool_v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false

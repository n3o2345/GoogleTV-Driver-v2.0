name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AndroidTV Control4 Driver ${{ github.ref_name }}"
          body: |
            ## AndroidTV Control4 Driver ${{ github.ref_name }}

            Control4 DriverWorks driver for Android TV / Google TV using the Android TV Remote Service v2 protocol.

            ### Downloads

            | File | Description |
            |---|---|
            | `AndroidTV_v2.0.c4z` | Control4 driver — install this in Composer |
            | `AndroidTV_Tool_v2.0.zip` | Windows utility for RSA key extraction (required for pairing setup) |

            ### Quick Start
            1. Install the `.c4z` driver in Control4 Composer
            2. Set the network binding to your Android TV device's static IP
            3. Run **AndroidTV_Tool** on a Windows PC to extract the device RSA public key
            4. Enter the key values in the driver properties, then pair

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup instructions.

            ---
            > Driver authored by **Greg Moerler**.
          files: |
            releases/AndroidTV_v2.0.c4z
            releases/AndroidTV_Tool_v2.0.zip
          draft: false
          prerelease: false
